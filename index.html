<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>BahasaBelajar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--ink:#16352e;--muted:#7c857f;--green:#174d40;--green2:#2d745f;--mint:#dcebdc;--cream:#f4f1e9;--paper:#fffdf8;--coral:#f17455;--purple:#6b4c9a;--purplebg:#ebe0f5;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:var(--cream);color:var(--ink);min-height:100dvh;padding-bottom:calc(70px + env(safe-area-inset-bottom))}
button{border:0;background:none;font:inherit;cursor:pointer;color:inherit}

/* tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--paper);border-top:1px solid #e8e6df;padding-bottom:env(safe-area-inset-bottom);z-index:99}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 6px;font-size:11px;color:var(--muted);font-weight:600}
.tab.active{color:var(--green)}
.tab-icon{font-size:20px}

/* pages */
.view{display:none;padding:20px 16px}
.view.active{display:block}

/* home */
.greeting{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--green2)}
.date-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.date-label{margin-top:6px;font-size:18px;font-weight:800}
.streak-badge{display:flex;align-items:baseline;gap:3px;padding:8px 12px;border-radius:12px;background:#fff;font-size:11px;color:#68736d;box-shadow:0 4px 14px rgba(25,55,46,.07)}
.streak-num{color:var(--ink);font-size:18px;font-weight:800}
.hero{border-radius:var(--radius);background:var(--mint);padding:24px;margin-bottom:24px}
.hero-kicker{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--green2)}
.hero-title{margin-top:8px;font-size:24px;font-weight:900;line-height:1.3}
.progress-bar{margin-top:16px;height:6px;border-radius:99px;background:rgba(23,77,64,.13);overflow:hidden}
.progress-fill{height:100%;border-radius:inherit;background:var(--green);transition:width .3s}
.section-title{font-size:15px;font-weight:800;margin-bottom:12px}
.task{display:flex;align-items:center;padding:16px;margin-bottom:10px;border-radius:var(--radius);background:var(--paper);box-shadow:0 4px 16px rgba(25,55,46,.05)}
.task-icon{width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:14px;font-size:16px;font-weight:900;flex-shrink:0}
.task-icon.learn{color:var(--green);background:var(--mint)}
.task-icon.review{color:#a44a34;background:#fbe1d8}
.task-icon.grammar{color:var(--purple);background:var(--purplebg)}
.task-body{flex:1;margin-left:14px}
.task-name{font-size:15px;font-weight:800}
.task-desc{font-size:11px;color:var(--muted);margin-top:4px}
.task-count{font-size:20px;font-weight:900;margin-right:4px}
.task-arrow{color:#ccc;font-size:22px}
.stats-row{display:flex;justify-content:space-around;padding:16px;margin-top:16px;border-radius:var(--radius);background:var(--paper);box-shadow:0 4px 16px rgba(25,55,46,.05)}
.stat{text-align:center}
.stat-val{font-size:18px;font-weight:900}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px}

/* study */
.study-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.study-head .close{font-size:24px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--paper)}
.study-progress{flex:1;height:5px;border-radius:99px;background:#e8e6df;overflow:hidden}
.study-progress-fill{height:100%;border-radius:inherit;background:var(--green);transition:width .3s}
.study-counter{font-size:12px;color:var(--muted);font-weight:700}
.word-card{min-height:50vh;padding:24px;border-radius:var(--radius);background:var(--paper);box-shadow:0 6px 24px rgba(25,55,46,.06);display:flex;flex-direction:column}
.word-level{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;background:var(--mint);color:var(--green)}
.word-main{text-align:center;font-size:32px;font-weight:900;font-family:Georgia,serif;margin:32px 0 4px}
.word-pos{text-align:center;font-size:13px;color:var(--muted);font-style:italic}
.think-hint{text-align:center;color:var(--muted);font-size:12px;margin-top:40px;display:flex;align-items:center;gap:8px;justify-content:center}
.think-hint::before,.think-hint::after{content:'';width:40px;height:1px;background:#ddd}
.word-meaning{text-align:center;font-size:20px;font-weight:800;margin-top:24px}
.word-examples{margin-top:20px}
.ex-item{margin-bottom:14px}
.ex-sentence{font-size:14px;font-weight:650;line-height:1.5}
.ex-zh{font-size:12px;color:var(--muted);margin-top:2px}
.study-actions{display:flex;gap:10px;margin-top:16px}
.study-actions button{flex:1;height:52px;border-radius:14px;font-size:15px;font-weight:800}
.btn-unknown{border:2px solid #e8c8a0;color:#b8860b;background:#fff}
.btn-know{background:var(--green);color:#fff}
.btn-easy{background:#e8e6df;color:var(--ink)}
.btn-next{background:var(--green);color:#fff}
.study-done{text-align:center;padding:60px 20px}
.study-done .mark{font-size:48px;color:var(--coral)}
.study-done h2{margin:16px 0 8px;font-size:22px}
.study-done p{color:var(--muted);font-size:13px}
.study-done button{margin-top:24px;width:100%;height:52px;border-radius:14px;background:var(--green);color:#fff;font-size:15px;font-weight:800}

/* grammar */
.grammar-head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.grammar-head .back{font-size:24px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--paper);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.grammar-head h1{flex:1;font-size:22px;font-weight:800}
.grammar-lesson-tag{padding:4px 12px;border-radius:99px;background:var(--mint);color:var(--green);font-size:11px;font-weight:700}
.grammar-subtitle{color:var(--muted);font-size:12px;font-style:italic;margin-bottom:20px}
.rule-card{margin-bottom:14px;padding:16px;border-radius:var(--radius);background:var(--paper);box-shadow:0 4px 16px rgba(25,55,46,.05)}
.rule-head{display:flex;justify-content:space-between;align-items:center}
.rule-pattern{font-size:16px;font-weight:800;color:var(--green);font-family:Georgia,serif}
.rule-arrow{color:var(--muted);font-size:14px}
.rule-meaning{font-size:13px;color:#555;margin-top:6px;line-height:1.5}
.rule-detail{margin-top:14px;padding-top:14px;border-top:1px dashed #ddd}
.rule-explain{font-size:13px;color:#444;line-height:1.7;margin-bottom:14px}
.rule-example{margin-bottom:14px;padding:12px;border-radius:10px;background:#f7f5ef}
.rule-example:last-child{margin-bottom:0}
.rex-word{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.rex-id{font-size:14px;font-weight:800;color:var(--green);font-family:Georgia,serif}
.rex-root{font-size:11px;color:var(--muted)}
.rex-sentence{font-size:13px;font-weight:650;line-height:1.6}
.rex-zh{margin-top:4px;font-size:11px;color:#888}

/* words list */
.words-head{margin-bottom:16px}
.words-head h1{font-size:22px;font-weight:800}
.search-box{display:flex;align-items:center;padding:10px 14px;border-radius:14px;background:var(--paper);box-shadow:0 4px 16px rgba(25,55,46,.05);margin-bottom:12px}
.search-box input{flex:1;border:0;outline:0;font-size:14px;background:transparent}
.filter-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-btn{flex:none;padding:8px 14px;border:1px solid #dedfd9;border-radius:99px;font-size:11px;font-weight:650;color:#707a74;background:rgba(255,255,255,.45);white-space:nowrap}
.filter-btn.active{border-color:var(--green);color:#fff;background:var(--green)}
.word-list{border-radius:var(--radius);background:var(--paper);box-shadow:0 4px 16px rgba(25,55,46,.05);overflow:hidden}
.wl-item{padding:14px;border-bottom:1px solid #eceae3}
.wl-item:last-child{border-bottom:0}
.wl-line{display:flex;align-items:center}
.wl-letter{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--green);background:var(--mint);font-family:Georgia,serif;font-size:15px;font-weight:800;flex-shrink:0}
.wl-info{flex:1;margin-left:12px;min-width:0}
.wl-word{font-family:Georgia,serif;font-size:15px;font-weight:800}
.wl-pos{margin-left:6px;color:#a0a59f;font-size:11px;font-style:italic}
.wl-meaning{margin-top:3px;font-size:12px;color:#747e77;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-examples{margin:10px 0 0 48px;padding-top:10px;border-top:1px dashed #ddd}
.list-end{text-align:center;padding:20px;font-size:11px;color:var(--muted)}

/* articles */
.art-card{padding:18px;margin-bottom:12px;border-radius:var(--radius);background:var(--paper);box-shadow:0 4px 16px rgba(25,55,46,.05)}
.art-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.art-cat{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:var(--purplebg);color:var(--purple)}
.art-level{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:var(--mint);color:var(--green)}
.art-title-id{font-size:17px;font-weight:800;font-family:Georgia,serif;color:var(--ink)}
.art-title-zh{font-size:13px;color:var(--muted);margin-top:3px}
.art-card-summary{font-size:12px;color:#888;margin-top:8px;line-height:1.5}
.art-summary{background:#f1ede3;border-radius:12px;padding:12px 14px;font-size:13px;color:#5a5346;line-height:1.6;margin-bottom:18px}
.sent{padding:14px 0;border-bottom:1px solid #eceae3}
.sent:last-child{border-bottom:0}
.sent-id{font-size:15px;font-weight:650;line-height:1.7;color:var(--ink)}
.sent-num{display:inline-block;min-width:20px;color:var(--green2);font-weight:800;font-family:Georgia,serif}
.sent-zh{font-size:13px;color:#6a736c;margin-top:6px;padding-left:20px;line-height:1.6}
.sent-note{font-size:12px;color:#9a8f6a;background:#faf8f0;border-left:3px solid #e3d9b8;border-radius:0 8px 8px 0;padding:7px 10px;margin-top:8px;margin-left:20px;line-height:1.6}
.trans-hidden .sent-zh,.trans-hidden .sent-note{display:none}
/* culture */
.cul-card{padding:16px;margin-bottom:12px;border-radius:var(--radius);background:var(--paper);box-shadow:0 4px 16px rgba(25,55,46,.05)}
.cul-head{display:flex;align-items:center;gap:12px}
.cul-emoji{font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:var(--cream);flex-shrink:0}
.cul-htext{flex:1;min-width:0}
.cul-title{font-size:15px;font-weight:800}
.cul-sub{font-size:12px;color:var(--muted);font-style:italic;margin-top:2px}
.cul-cat{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;background:var(--purplebg);color:var(--purple);flex-shrink:0}
.cul-detail{margin-top:14px;padding-top:14px;border-top:1px dashed #ddd}
.cul-body{font-size:13px;color:#444;line-height:1.85}
.cul-terms{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.cul-term{display:flex;gap:10px;align-items:baseline;font-size:13px}
.cul-term-w{font-family:Georgia,serif;font-weight:800;color:var(--green);min-width:96px}
.cul-term-m{color:#6a736c}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="v-home" class="view active">
  <div class="greeting" id="greeting">Selamat pagi</div>
  <div class="date-line">
    <div class="date-label" id="dateLabel"></div>
    <div class="streak-badge">◆ <span class="streak-num" id="streakNum">0</span> 天</div>
  </div>
  <div class="hero">
    <div class="hero-kicker">BAHASA HARI INI</div>
    <div class="hero-title">每天一点，<br>印尼语自然会。</div>
    <div class="progress-bar"><div class="progress-fill" id="homeProgress" style="width:0%"></div></div>
  </div>
  <div class="section-title">今日训练</div>
  <div class="task" onclick="startLearn()">
    <div class="task-icon learn">Aa</div>
    <div class="task-body"><div class="task-name">学习新词</div><div class="task-desc">认识它，再理解它</div></div>
    <span class="task-count" id="newCount">0</span><span class="task-arrow">›</span>
  </div>
  <div class="task" onclick="startGrammar()">
    <div class="task-icon grammar">文</div>
    <div class="task-body"><div class="task-name">语法笔记</div><div class="task-desc">词缀规则、句型拆解</div></div>
    <span class="task-arrow">›</span>
  </div>
  <div class="task" onclick="startReview()">
    <div class="task-icon review">↻</div>
    <div class="task-body"><div class="task-name">巩固复习</div><div class="task-desc">在忘记之前再见一面</div></div>
    <span class="task-count" id="dueCount">0</span><span class="task-arrow">›</span>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="learnedStat">0</div><div class="stat-lbl">已学单词</div></div>
    <div class="stat"><div class="stat-val" id="totalStat">0</div><div class="stat-lbl">完整词库</div></div>
    <div class="stat"><div class="stat-val" id="todayDone">—</div><div class="stat-lbl">今日打卡</div></div>
  </div>
</div>

<!-- ===== STUDY ===== -->
<div id="v-study" class="view">
  <div class="study-head">
    <button class="close" onclick="closeStudy()">✕</button>
    <div class="study-progress"><div class="study-progress-fill" id="studyProgress"></div></div>
    <span class="study-counter" id="studyCounter">0/0</span>
  </div>
  <div id="studyCard" class="word-card"></div>
  <div class="study-actions" id="studyActions"></div>
</div>

<!-- ===== GRAMMAR ===== -->
<div id="v-grammar" class="view">
  <div class="grammar-head">
    <button class="back" onclick="closeGrammar()">‹</button>
    <h1>语法笔记</h1>
    <span class="grammar-lesson-tag" id="grammarTag">第2课</span>
  </div>
  <div class="grammar-subtitle">Tata Bahasa · Pelajaran ke-2</div>
  <div id="grammarList"></div>
</div>

<!-- ===== WORDS ===== -->
<div id="v-words" class="view">
  <div class="words-head"><h1>词库</h1></div>
  <div class="search-box">🔍 <input id="searchInput" placeholder="搜索单词或释义" oninput="searchWords()"></div>
  <div class="filter-row">
    <button class="filter-btn active" data-level="" onclick="filterLevel(this)">全部</button>
    <button class="filter-btn" data-level="1" onclick="filterLevel(this)">入门</button>
    <button class="filter-btn" data-level="2" onclick="filterLevel(this)">初级</button>
    <button class="filter-btn" data-level="3" onclick="filterLevel(this)">中级</button>
  </div>
  <div id="wordList" class="word-list"></div>
  <div class="list-end" id="listEnd"></div>
</div>

<!-- ===== ARTICLES ===== -->
<div id="v-articles" class="view">
  <div class="words-head"><h1>印尼文章</h1></div>
  <div class="grammar-subtitle">逐句对照 · 时政 / 经济 / 科技</div>
  <div id="articleList"></div>
</div>

<!-- ===== ARTICLE DETAIL ===== -->
<div id="v-article" class="view">
  <div class="grammar-head">
    <button class="back" onclick="showView('articles', document.querySelectorAll('.tab')[1])">‹</button>
    <h1 id="artTitle" style="font-size:18px"></h1>
    <button id="transToggle" class="grammar-lesson-tag" onclick="toggleTrans()">隐藏中文</button>
  </div>
  <div id="artMeta" class="grammar-subtitle"></div>
  <div id="artSummary" class="art-summary"></div>
  <div id="artBody"></div>
</div>

<!-- ===== CULTURE ===== -->
<div id="v-culture" class="view">
  <div class="words-head"><h1>印尼文化</h1></div>
  <div class="grammar-subtitle">Budaya Indonesia · 点开看详情</div>
  <div id="cultureList"></div>
</div>

<!-- ===== TABS ===== -->
<div class="tabs">
  <button class="tab active" onclick="showView('home',this)"><span class="tab-icon">🏠</span>今日</button>
  <button class="tab" onclick="showView('articles',this)"><span class="tab-icon">📄</span>文章</button>
  <button class="tab" onclick="showView('culture',this)"><span class="tab-icon">🎭</span>文化</button>
  <button class="tab" onclick="showView('words',this)"><span class="tab-icon">📖</span>词库</button>
  <button class="tab" onclick="showView('settings',this)"><span class="tab-icon">⚙️</span>设置</button>
</div>

<!-- ===== SETTINGS (inline) ===== -->
<div id="v-settings" class="view">
  <h1 style="font-size:22px;font-weight:800;margin-bottom:20px">设置</h1>
  <div style="border-radius:var(--radius);background:var(--paper);padding:16px;box-shadow:0 4px 16px rgba(25,55,46,.05)">
    <div style="margin-bottom:20px">
      <div style="font-weight:700;margin-bottom:4px">Supabase URL</div>
      <input id="cfgUrl" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:13px" placeholder="https://xxx.supabase.co">
    </div>
    <div style="margin-bottom:20px">
      <div style="font-weight:700;margin-bottom:4px">Supabase Anon Key</div>
      <input id="cfgKey" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:13px" placeholder="eyJ...">
    </div>
    <button onclick="saveConfig()" style="width:100%;height:48px;border-radius:14px;background:var(--green);color:#fff;font-size:15px;font-weight:800">保存并连接</button>
    <div id="cfgStatus" style="margin-top:12px;text-align:center;font-size:12px;color:var(--muted)"></div>
  </div>
</div>

<script>
// ===== CONFIG =====
let SUPABASE_URL = localStorage.getItem('sb_url') || 'https://bzdelpmcewjdvmgyafux.supabase.co'
let SUPABASE_KEY = localStorage.getItem('sb_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZGVscG1jZXdqZHZtZ3lhZnV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjY1MDksImV4cCI6MjA4ODkwMjUwOX0.x_D0VGGmXCY9rueAh0lV4f7r9wOJIGCHs19w5S2BNpg'
let sb = null

function initSupabase() {
  if (!SUPABASE_URL || !SUPABASE_KEY) return false
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  return true
}

function saveConfig() {
  SUPABASE_URL = document.getElementById('cfgUrl').value.trim()
  SUPABASE_KEY = document.getElementById('cfgKey').value.trim()
  localStorage.setItem('sb_url', SUPABASE_URL)
  localStorage.setItem('sb_key', SUPABASE_KEY)
  if (initSupabase()) {
    document.getElementById('cfgStatus').textContent = '已连接！'
    loadHome()
  }
}

// ===== NAV =====
function showView(name, tabEl) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
  document.getElementById('v-' + name).classList.add('active')
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  if (tabEl) tabEl.classList.add('active')
  if (name === 'home') loadHome()
  if (name === 'words') { wordsOffset = 0; loadWords() }
  if (name === 'articles') loadArticles()
  if (name === 'culture') loadCulture()
}

// ===== DATE HELPERS =====
function todayStr() {
  const d = new Date()
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')
}
function addDays(dateStr, n) {
  const d = new Date(dateStr)
  d.setDate(d.getDate() + n)
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')
}

// SRS intervals
const INTERVALS = {1:1, 2:2, 3:4, 4:7, 5:15, 6:30, 7:60}

// ===== HOME =====
async function loadHome() {
  if (!sb) return
  const t = todayStr()
  const h = new Date().getHours()
  document.getElementById('greeting').textContent = h < 12 ? 'Selamat pagi' : h < 18 ? 'Selamat siang' : 'Selamat malam'
  document.getElementById('dateLabel').textContent = `${new Date().getMonth()+1}月${new Date().getDate()}日 · 今日计划`

  const [{count: totalWords}, {count: learnedWords}] = await Promise.all([
    sb.from('words').select('*', {count:'exact', head:true}),
    sb.from('learning').select('*', {count:'exact', head:true})
  ])
  const {count: dueCount} = await sb.from('learning').select('*',{count:'exact',head:true}).eq('status','reviewing').lte('next_review_at', t)
  const {data: ci} = await sb.from('checkins').select('*').eq('date', t).maybeSingle()
  const checkin = ci || {new_learned:0, reviewed:0, completed:0}
  const newRemaining = Math.max(0, 10 - checkin.new_learned)

  document.getElementById('newCount').textContent = newRemaining
  document.getElementById('dueCount').textContent = dueCount || 0
  document.getElementById('learnedStat').textContent = learnedWords || 0
  document.getElementById('totalStat').textContent = totalWords || 0
  document.getElementById('todayDone').textContent = checkin.completed ? '✓' : '—'
  document.getElementById('streakNum').textContent = await getStreak(t)

  const done = checkin.new_learned + checkin.reviewed
  const total = 10 + (dueCount||0) + checkin.reviewed
  const pct = checkin.completed ? 100 : Math.min(100, Math.round(done / Math.max(1,total)*100))
  document.getElementById('homeProgress').style.width = pct + '%'
}

async function getStreak(t) {
  const {data} = await sb.from('checkins').select('date').eq('completed',1).order('date',{ascending:false}).limit(60)
  if (!data) return 0
  const set = new Set(data.map(r=>r.date))
  let d = set.has(t) ? t : addDays(t,-1)
  let s = 0
  while (set.has(d)) { s++; d = addDays(d,-1) }
  return s
}

// ===== STUDY =====
let studyQueue = [], studyIdx = 0, studyCompleted = 0, studyMode = 'learn'

async function startLearn() {
  if (!sb) return alert('请先在设置中配置 Supabase')
  studyMode = 'learn'
  const t = todayStr()
  const {data: ci} = await sb.from('checkins').select('*').eq('date',t).maybeSingle()
  const done = ci ? ci.new_learned : 0
  const limit = Math.max(0, 10 - done)
  if (!limit) return alert('今日新词已学完！')
  // PostgREST 不支持子查询，先取已学 id 列表再排除
  const {data: learned} = await sb.from('learning').select('word_id')
  const learnedIds = (learned || []).map(r => r.word_id)
  let q = sb.from('words').select('*').order('level').order('id').limit(limit)
  if (learnedIds.length) q = q.not('id', 'in', `(${learnedIds.join(',')})`)
  const {data} = await q
  if (!data || !data.length) return alert('词库已全部学完！')
  studyQueue = data.map(w => ({...w, wrongTimes:0}))
  studyIdx = 0; studyCompleted = 0
  showView('study')
  renderStudy()
}

async function startReview() {
  if (!sb) return alert('请先在设置中配置 Supabase')
  studyMode = 'review'
  const t = todayStr()
  const {data} = await sb.from('learning').select('word_id, stage, words(*)').eq('status','reviewing').lte('next_review_at',t).order('next_review_at').limit(100)
  if (!data || !data.length) return alert('暂无待复习单词！')
  studyQueue = data.map(r => ({...r.words, stage: r.stage, wrongTimes:0}))
  studyIdx = 0; studyCompleted = 0
  showView('study')
  renderStudy()
}

function renderStudy() {
  const total = studyQueue.length
  const pct = Math.round(studyCompleted / Math.max(1,total) * 100)
  document.getElementById('studyProgress').style.width = pct + '%'
  document.getElementById('studyCounter').textContent = `${studyCompleted}/${total}`

  if (studyIdx >= studyQueue.length) {
    document.getElementById('studyCard').innerHTML = `<div class="study-done"><div class="mark">◆</div><h2>做得漂亮</h2><p>完成 ${total} 个单词</p><button onclick="closeStudy()">完成训练</button></div>`
    document.getElementById('studyActions').innerHTML = ''
    return
  }
  const w = studyQueue[studyIdx]
  const levelName = w.level===1?'入门':w.level===2?'初级':'中级'
  document.getElementById('studyCard').innerHTML = `
    <span class="word-level">${levelName}</span>
    <div class="word-main">${w.word}</div>
    <div class="word-pos">${w.pos}</div>
    <div id="answerArea"><div class="think-hint">先在脑海里回想它的意思</div></div>`
  document.getElementById('studyActions').innerHTML = `
    <button class="btn-unknown" onclick="revealUnknown()">✕ 不认识</button>
    <button class="btn-know" onclick="revealKnown()">✓ 认识</button>`
}

function revealKnown() {
  showAnswer()
  const w = studyQueue[studyIdx]
  document.getElementById('studyActions').innerHTML = w.wrongTimes
    ? `<button class="btn-next" onclick="nextWord(false)" style="width:100%">继续，下次我会记住</button>`
    : `<button class="btn-easy" onclick="submitResult('easy')">太简单了</button><button class="btn-know" onclick="submitResult('known')">记住了</button>`
}

function revealUnknown() {
  const w = studyQueue[studyIdx]
  w.wrongTimes++
  studyQueue.splice(Math.min(studyIdx+4, studyQueue.length), 0, {...w, retry:true})
  showAnswer()
  document.getElementById('studyActions').innerHTML = `<button class="btn-next" onclick="nextWord(false)" style="width:100%">继续，下次我会记住</button>`
}

function showAnswer() {
  const w = studyQueue[studyIdx]
  const exHtml = (w.examples||[]).map(e => `<div class="ex-item"><div class="ex-sentence">${e.id}</div><div class="ex-zh">${e.zh}</div></div>`).join('')
  document.getElementById('answerArea').innerHTML = `<div class="word-meaning">${w.meaning}</div><div class="word-examples">${exHtml}</div>`
}

async function submitResult(result) {
  const w = studyQueue[studyIdx]
  const t = todayStr()
  if (studyMode === 'learn') {
    const stage = result === 'easy' ? 3 : 1
    const next = addDays(t, INTERVALS[stage])
    await sb.from('learning').insert({word_id:w.id, stage, status:'reviewing', next_review_at:next, learned_at:t, last_review_at:t, correct_count:1, wrong_count:w.wrongTimes})
    await bumpCheckin(t, 'new_learned')
  } else {
    const correct = !w.wrongTimes
    let stage = w.stage
    if (correct) { stage = Math.min(7, stage+1) } else { stage = Math.max(1, stage-2) }
    const status = stage > 7 ? 'mastered' : 'reviewing'
    const next = addDays(t, INTERVALS[Math.min(stage,7)])
    await sb.from('learning').update({stage, status, next_review_at:next, last_review_at:t, correct_count: w.correct_count+(correct?1:0), wrong_count: w.wrong_count+(correct?0:1)}).eq('word_id',w.id)
    await bumpCheckin(t, 'reviewed')
  }
  nextWord(true)
}

function nextWord(countDone) {
  if (countDone) studyCompleted++
  studyIdx++
  renderStudy()
}

async function bumpCheckin(t, field) {
  const {data: existing} = await sb.from('checkins').select('*').eq('date',t).maybeSingle()
  if (existing) {
    await sb.from('checkins').update({[field]: existing[field]+1}).eq('date',t)
  } else {
    await sb.from('checkins').insert({date:t, [field]:1})
  }
}

function closeStudy() { showView('home', document.querySelector('.tab')) }

// ===== GRAMMAR =====
let grammarExpanded = -1

async function startGrammar() {
  if (!sb) return alert('请先在设置中配置 Supabase')
  const {data} = await sb.from('grammar').select('*').eq('lesson',2).order('id')
  if (!data || !data.length) return alert('暂无语法内容')
  showView('grammar')
  const html = data.map((r, i) => {
    const exHtml = r.examples.map(ex => `
      <div class="rule-example">
        ${ex.root ? `<div class="rex-word"><span class="rex-id">${ex.id}</span><span class="rex-root">← ${ex.root}</span></div>` : ''}
        <div class="rex-sentence">${ex.sentence}</div>
        <div class="rex-zh">${ex.zh}</div>
      </div>`).join('')
    return `<div class="rule-card" onclick="toggleRule(${i})">
      <div class="rule-head"><span class="rule-pattern">${r.pattern}</span><span class="rule-arrow" id="rarr${i}">›</span></div>
      <div class="rule-meaning">${r.meaning}</div>
      <div class="rule-detail hidden" id="rdetail${i}">
        <div class="rule-explain">${r.explain}</div>
        ${exHtml}
      </div>
    </div>`
  }).join('')
  document.getElementById('grammarList').innerHTML = html
  grammarExpanded = -1
}

function toggleRule(i) {
  if (grammarExpanded === i) {
    document.getElementById('rdetail'+i).classList.add('hidden')
    document.getElementById('rarr'+i).textContent = '›'
    grammarExpanded = -1
  } else {
    if (grammarExpanded >= 0) {
      document.getElementById('rdetail'+grammarExpanded).classList.add('hidden')
      document.getElementById('rarr'+grammarExpanded).textContent = '›'
    }
    document.getElementById('rdetail'+i).classList.remove('hidden')
    document.getElementById('rarr'+i).textContent = '▾'
    grammarExpanded = i
  }
}

function closeGrammar() { showView('home', document.querySelector('.tab')) }

// ===== WORDS =====
let wordsOffset = 0, currentLevel = '', wordItems = []

async function loadWords() {
  if (!sb) return
  let q = sb.from('words').select('*, learning(stage,status)').order('level').order('id')
  if (currentLevel) q = q.eq('level', Number(currentLevel))
  const search = document.getElementById('searchInput').value.trim()
  if (search) q = q.or(`word.ilike.%${search}%,meaning.ilike.%${search}%`)
  const {data, count} = await q.range(0, 99)
  wordItems = data || []
  renderWords()
}

function renderWords() {
  const html = wordItems.map((w,i) => {
    const levelName = w.level===1?'入门':w.level===2?'初级':'中级'
    const st = w.learning && w.learning.length ? w.learning[0] : null
    const statusLabel = !st ? '未学' : st.status === 'mastered' ? '已掌握' : '学习中'
    const exHtml = (w.examples||[]).map(e => `<div class="ex-item"><div class="ex-sentence">${e.id}</div><div class="ex-zh">${e.zh}</div></div>`).join('')
    return `<div class="wl-item" onclick="this.querySelector('.wl-examples').classList.toggle('hidden')">
      <div class="wl-line">
        <div class="wl-letter">${w.word[0].toUpperCase()}</div>
        <div class="wl-info">
          <span class="wl-word">${w.word}</span><span class="wl-pos">${w.pos}</span>
          <div class="wl-meaning">${w.meaning}</div>
        </div>
      </div>
      <div class="wl-examples hidden">${exHtml}</div>
    </div>`
  }).join('')
  document.getElementById('wordList').innerHTML = html
  document.getElementById('listEnd').textContent = `共 ${wordItems.length} 个单词`
}

function searchWords() { loadWords() }
function filterLevel(el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  el.classList.add('active')
  currentLevel = el.dataset.level
  loadWords()
}

// ===== ARTICLES =====
let articleCache = []

async function loadArticles() {
  if (!sb) return
  const {data} = await sb.from('articles').select('*').order('id')
  articleCache = data || []
  document.getElementById('articleList').innerHTML = articleCache.map(a => {
    const lv = a.level===1?'入门':a.level===2?'初级':'中级'
    return `<div class="art-card" onclick="openArticle(${a.id})">
      <div class="art-card-top"><span class="art-cat">${a.category}</span><span class="art-level">${lv}</span></div>
      <div class="art-title-id">${a.title}</div>
      <div class="art-title-zh">${a.title_zh}</div>
      ${a.summary ? `<div class="art-card-summary">${a.summary}</div>` : ''}
    </div>`
  }).join('') || '<div class="list-end">暂无文章</div>'
}

function openArticle(id) {
  const a = articleCache.find(x => x.id === id)
  if (!a) return
  const lv = a.level===1?'入门':a.level===2?'初级':'中级'
  document.getElementById('artTitle').textContent = a.title_zh
  document.getElementById('artMeta').textContent = `${a.title} · ${a.category} · ${lv} · 共 ${a.sentences.length} 句`
  document.getElementById('artSummary').textContent = a.summary || ''
  document.getElementById('artBody').innerHTML = a.sentences.map((s, i) => `
    <div class="sent">
      <div class="sent-id"><span class="sent-num">${i+1}.</span>${s.id}</div>
      <div class="sent-zh">${s.zh}</div>
      ${s.note ? `<div class="sent-note">💡 ${s.note}</div>` : ''}
    </div>`).join('')
  const body = document.getElementById('artBody')
  body.classList.remove('trans-hidden')
  document.getElementById('transToggle').textContent = '隐藏中文'
  showView('article')
  window.scrollTo(0, 0)
}

function toggleTrans() {
  const body = document.getElementById('artBody')
  const hidden = body.classList.toggle('trans-hidden')
  document.getElementById('transToggle').textContent = hidden ? '显示中文' : '隐藏中文'
}

// ===== CULTURE =====
let cultureExpanded = -1

async function loadCulture() {
  if (!sb) return
  const {data} = await sb.from('culture').select('*').order('id')
  document.getElementById('cultureList').innerHTML = (data || []).map((c, i) => {
    const terms = (c.terms||[]).map(t => `<div class="cul-term"><span class="cul-term-w">${t.word}</span><span class="cul-term-m">${t.meaning}</span></div>`).join('')
    return `<div class="cul-card" onclick="toggleCulture(${i})">
      <div class="cul-head">
        <div class="cul-emoji">${c.emoji}</div>
        <div class="cul-htext"><div class="cul-title">${c.title}</div><div class="cul-sub">${c.title_id||''}</div></div>
        <span class="cul-cat">${c.category}</span>
      </div>
      <div class="cul-detail hidden" id="culd${i}">
        <div class="cul-body">${c.body}</div>
        ${terms ? `<div class="cul-terms">${terms}</div>` : ''}
      </div>
    </div>`
  }).join('') || '<div class="list-end">暂无内容</div>'
  cultureExpanded = -1
}

function toggleCulture(i) {
  const el = document.getElementById('culd'+i)
  if (cultureExpanded === i) { el.classList.add('hidden'); cultureExpanded = -1; return }
  if (cultureExpanded >= 0) document.getElementById('culd'+cultureExpanded).classList.add('hidden')
  el.classList.remove('hidden')
  cultureExpanded = i
}
